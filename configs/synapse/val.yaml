dataset:
  name: "Synapse"
  alias: "Synapse multi-organ"
  official_task: "Task02_Synapse"
  modality: "CT"
  tensor_image_size: "4D"
  official_num_training_cases: 30
  official_num_test_cases: 12
  labels:
    0: "background"
    1: "spleen"
    2: "right kidney"
    3: "left kidney"
    4: "gallbladder"
    5: "esophagus"
    6: "liver"
    7: "stomach"
    8: "aorta"
    9: "inferior vena cava"
    10: "portal vein and splenic vein"
    11: "pancreas"
    12: "right adrenal gland"
    13: "left adrenal gland"
  paper_target_organs:
    - "aorta"
    - "gallbladder"
    - "right kidney"
    - "left kidney"
    - "liver"
    - "pancreas"
    - "spleen"
    - "stomach"
  num_classes: 9
  root_raw: "./3Dsegmentation/data/DATASET_Synapse/unetr_pp_raw/unetr_pp_raw_data/Task02_Synapse"
  root_processed: "./data/processed/synapse"
  official_dataset_json: "./3Dsegmentation/data/DATASET_Synapse/unetr_pp_raw/unetr_pp_raw_data/Task02_Synapse/dataset.json"
  split_file: "./data/splits/synapse_val.txt"
  input_format: "pt_slice"
  preprocessing:
    slice_axis: "axial"
    normalize: "zscore"

model:
  in_channels: 1
  num_classes: 9

evaluation:
  batch_size: 8
  metrics: ["dice", "hd95"]
  report_per_class: true
